name: App build, tests and coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        run: rustup toolchain install 1.97.0 --profile minimal

      - name: Cache cargo artifacts
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-tests

      - name: Install test tools
        run: cargo install --locked cargo-nextest

      - name: Build
        run: cargo build --locked

      - name: Run tests
        run: cargo nextest run --locked

      - name: Run doctests
        run: cargo test --locked --doc

  firebase_emulators:
    name: firebase-emulators
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        run: rustup toolchain install 1.97.0 --profile minimal

      - name: Set up Java
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Set up Just
        uses: extractions/setup-just@v4.0.0

      - name: Cache cargo artifacts
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-firebase-emulators

      - name: Cache Firebase emulators
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-firebase-tools-15.24.0

      # The emulator CLI is a pinned CI tool; this repository has no Node dependency graph to lock.
      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15.24.0 # zizmor: ignore[adhoc-packages]

      - name: Run required Firestore emulator tests
        run: just test-emulators-ci

  ci:
    name: ci
    runs-on: ubuntu-latest
    if: always()
    needs:
      - tests
      - firebase_emulators
    steps:
      - name: Require successful test jobs
        env:
          FIREBASE_EMULATORS_RESULT: ${{ needs.firebase_emulators.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
        run: |
          [[ "$TESTS_RESULT" == "success" ]]
          [[ "$FIREBASE_EMULATORS_RESULT" == "success" ]]

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        run: rustup toolchain install 1.97.0 --profile minimal --component llvm-tools-preview

      - name: Cache cargo artifacts
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-coverage

      - name: Install coverage tools
        run: |
          cargo install --locked cargo-nextest
          cargo install --locked cargo-llvm-cov

      - name: Generate lcov report
        run: cargo llvm-cov nextest --locked --lcov --output-path coverage.lcov

      - name: Generate HTML coverage report
        run: cargo llvm-cov nextest --locked --html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.lcov
            target/llvm-cov/html
          if-no-files-found: error
          retention-days: 7
