name: App build, tests and coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        run: rustup toolchain install 1.97.0 --profile minimal

      - name: Cache cargo artifacts
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-tests

      - name: Install test tools
        run: cargo install --locked cargo-nextest

      - name: Build
        run: cargo build --locked

      - name: Run tests
        run: cargo nextest run --locked

      - name: Run doctests
        run: cargo test --locked --doc

  coverage:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        run: rustup toolchain install 1.97.0 --profile minimal --component llvm-tools-preview

      - name: Cache cargo artifacts
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-coverage

      - name: Install coverage tools
        run: |
          cargo install --locked cargo-nextest
          cargo install --locked cargo-llvm-cov

      - name: Generate lcov report
        run: cargo llvm-cov nextest --locked --lcov --output-path coverage.lcov

      - name: Generate HTML coverage report
        run: cargo llvm-cov nextest --locked --html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.lcov
            target/llvm-cov/html
          if-no-files-found: error
          retention-days: 7
