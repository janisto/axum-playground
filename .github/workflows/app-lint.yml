name: App code quality (linting and formatting)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt

      - name: Cache cargo artifacts
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-lint

      - name: Install QA tools
        run: |
          cargo install --locked cargo-sort
          cargo install --locked cargo-machete
          cargo install --locked cargo-deny
          cargo install --locked cargo-audit

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Manifest ordering
        run: cargo sort --check --grouped

      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Documentation
        run: cargo doc --locked --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D rustdoc::all

      - name: Unused dependencies
        run: cargo machete

      - name: Dependency policy
        run: cargo deny check

      - name: Security audit
        run: cargo audit
