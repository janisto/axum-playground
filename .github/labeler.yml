# Auto-label PRs based on changed file paths

app:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'

functions:
  - changed-files:
      - any-glob-to-any-file:
          - 'functions/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'AGENTS.md'
          - '.agents/**/*.md'
          - '.github/**/*.md'
          - 'functions/README.md'

tooling:
  - changed-files:
      - any-glob-to-any-file:
          - 'Cargo.toml'
          - 'Cargo.lock'
          - 'Justfile'
          - 'rust-toolchain.toml'
          - 'deny.toml'
          - '.clippy.toml'
          - 'Dockerfile'
          - '.dockerignore'
          - 'cloudbuild.yaml'

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/dependabot.yml'

feature:
  - head-branch: ['^feature', 'feature']

bug:
  - head-branch: ['^bug', 'bug']

improvement:
  - head-branch: ['^improve', 'improve', 'improvement']
