[graph]
all-features = true

[advisories]
ignore = [
    # Transitive through firestore 0.49.0 with no safe replacement available yet.
    # Recheck by 2026-10-16 or when upgrading firestore.
    "RUSTSEC-2024-0384",
    "RUSTSEC-2025-0012",
]

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
